<h2>解説</h2>
ドラゴンボールZに登場。サイヤ人編でベジータと戦っていた頃の悟空。<br>
7500ポリゴンとポリゴン数に糸目をつけずに制作した…と記憶している。<br>
陰影やラインのすべてをテクスチャに直接描きこんだ<br>
Unityで言う所のUnlitともいうべきシェーディングをしている。<br>
<br>
筋肉質な男のモデリングは初めてだったはずなので、正直拙い箇所が多い。肩とか服を突き抜けちゃってるし。<br>
実は同じフォーマットでベジータのモデリングも当時やっていたはずのだが、パソコンのデータ整理の時にどっか行ってしまった。
